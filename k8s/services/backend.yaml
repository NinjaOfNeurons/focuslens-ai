apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: focuslens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: focuslens/backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: focuslens-config
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: focuslens-config
              key: REDIS_URL
        - name: ANALYTICS_URL
          valueFrom:
            configMapKeyRef:
              name: focuslens-config
              key: ANALYTICS_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: focuslens
spec:
  selector:
    app: backend
  ports:
  - port: 8000
    targetPort: 8000